name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: |
          # Install pre-built binary for speed
          wget -qO- https://github.com/DioxusLabs/dioxus/releases/download/v0.5.7/dx-x86_64-unknown-linux-gnu.tar.gz | tar xzf - 
          chmod +x dx
          mv dx /usr/local/bin/

      - name: Build
        run: |
          cd rs
          # GitHub Pages is hosted at /<repo-name>/, so we set the base path accordingly
          # extract repo name from github.repository (owner/repo)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "Building with base path: /$REPO_NAME/"
          
          dx build --release --base-path "/$REPO_NAME/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rs/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
